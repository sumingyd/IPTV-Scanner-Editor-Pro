name: Build and Publish Windows EXE

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to check out and build."
        required: true
        default: "main"
        type: string
      release_tag:
        description: "Existing release tag to upload the executable to."
        required: true
        type: string

permissions:
  contents: write

env:
  EXE_PATH: dist/IPTV Scanner Editor Pro.exe
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

jobs:
  build-and-publish:
    name: Build EXE and update release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          
      - name: Download and Extract MPV/FFmpeg (PowerShell)
        shell: powershell
        run: |
          # 创建 mpv 目录
          New-Item -ItemType Directory -Force -Path .\mpv
          Invoke-WebRequest -Uri "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-v3-20260610-git-304426c.7z" -OutFile "mpv.7z"
          # 解压到当前目录（压缩包内已包含 mpv 根目录或直接释放，7z x -o. 会自动处理）
          7z x mpv.7z -o .
          dir .\mpv
          New-Item -ItemType Directory -Force -Path .\ffmpge
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-git-full.7z" -OutFile "ffmpge.7z"
          dir .
          7z x ffmpge.7z -o .
          dir .\ffmpge

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          if (-not (Test-Path "build.py")) {
            throw "Build script not found: build.py"
          }
          python build.py

      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ env.EXE_PATH }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
