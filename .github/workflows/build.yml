name: Build and Publish App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the executable to."
        required: true
        type: string
      platform:
        description: "Target platform to build for."
        required: false
        default: "windows"
        type: choice
        options:
          - windows
          - linux-arm64
C
permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  MPV_URL: "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-v3-20260610-git-304426c.7z"
  FFMPEG_URL: "https://github.com/GyanD/codexffmpeg/releases/download/2026-06-08-git-6028720d70/ffmpeg-2026-06-08-git-6028720d70-essentials_build.7z"
  MPV_LINUX_URL: ""
  FFMPEG_LINUX_ARM64_URL2: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linuxarm64-gpl-8.1.tar.xz"
  FFMPEG_LINUX_ARM64_URL: "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz"

jobs:
  build-and-publish:
    name: Build Windows exe
    runs-on: windows-latest
    if: inputs.platform == 'windows' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          
      - name: Download and Prepare MPV/FFmpeg
        shell: powershell
        run: |
          Write-Host "Downloading mpv from: $env:MPV_URL"
          Invoke-WebRequest -Uri $env:MPV_URL -OutFile "mpv.7z"
          Write-Host "Extracting mpv.7z to ./mpv"
          7z x mpv.7z -ompv -y
          dir ./mpv

          Write-Host "Downloading ffmpeg from: $env:FFMPEG_URL"
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile "ffmpeg.7z"         
          $ffmpegExtractDir = "_ffmpeg_extract"
          Write-Host "Extracting ffmpeg.7z to ./$ffmpegExtractDir"
          7z x ffmpeg.7z "-o$ffmpegExtractDir" -y

          Write-Host "Trying to find folder of ffmpeg.exe"
          $ffmpegBin = Get-ChildItem -Path $ffmpegExtractDir -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } |
            Select-Object -First 1

          if ($null -eq $ffmpegBin) {
            throw "Could not find ffmpeg.exe after extracting ffmpeg.7z."
          }                   
          if (Test-Path ".\ffmpeg") {
            Remove-Item ".\ffmpeg" -Recurse -Force
          }
          Write-Host "Moving $ffmpegBin.FullName (folder of ffmpeg.exe) to .\ffmpeg"
          Move-Item -Path $ffmpegBin.FullName -Destination ".\ffmpeg"
          dir ./ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          if (-not (Test-Path "build.py")) {
            throw "Build script not found: build.py"
          }
          python build.py

      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ env.EXE_PATH }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: Build Linux ARM64 App (native aarch64)
    # Use ubuntu-24.04-arm runner — GitHub provides free ARM64 runners for public repos
    runs-on: ubuntu-24.04-arm
    if: inputs.platform == 'linux-arm64' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Verify ARM64 architecture
        run: |
          echo "=== Build Environment ==="
          uname -a
          arch
          lscpu | grep "Architecture" || true
          python3 --version

      - name: Install system dependencies (ARM64 native)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon0 \
            libxcb1 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libssl3t64 \
            libegl1 \
            libopengl0 \
            libpulse0 \
            libglib2.0-0t64 \
            libmpv-dev \
            ffmpeg

      - name: Prepare MPV (Linux ARM64 native)
        run: |
          echo "=== Preparing MPV for Linux ARM64 ==="
          
          # did not find a static libmpv package, use libmpv in native arm64 linux
          mkdir -p mpv
          
          if [ -f /usr/lib/aarch64-linux-gnu/libmpv.so.2 ]; then
            sudo cp /usr/lib/aarch64-linux-gnu/libmpv.so.2 mpv/
            echo "Copied system libmpv.so.2 (ARM64 native)"
            file mpv/libmpv.so.2
          else
            # Download ARM64 static libmpv as fallback
            echo "System libmpv.so.2 not found, please try to use ARM64 static build..."
            exit 1 
          fi
          echo "list files on mpv folder"
          ls ./mpv

      - name: Prepare FFmpeg (Linux ARM64 native)
        run: |
          echo "=== Preparing FFmpeg for Linux ARM64 ==="
          
          # try to donwload static ffmpeg packages and extract to get target files
          mkdir -p ffmpeg
 
          wget -q "$FFMPEG_LINUX_ARM64_URL2" -O /tmp/ffmpeg-arm64.tar.xz 2>/dev/null && {
              tar -xf /tmp/ffmpeg-arm64.tar.xz -C /tmp/
              find /tmp -name "ffprobe" -type f -exec cp {} ffmpeg/ \; 2>/dev/null || true
              find /tmp -name "ffmpeg" -type f -exec cp {} ffmpeg/ \; 2>/dev/null || true
            } || echo "Warning: Could not download FFmpeg ARM64 static build" >&2 && exit 1

          echo "list files on ffmpeg folder"
          ls ./ffmpeg 
   

      - name: Install Python dependencies (ARM64 native)
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          
          # PySide6 provides pre-built wheels for linux-aarch64 since 6.5+
          python3 -m pip install -r requirements.txt
          python3 -m pip install pyinstaller

      - name: Build Linux ARM64 App (PyInstaller)
        run: |
          echo "=== Building Linux ARM64 Application ==="
          
          # Use bash build script for Linux compatibility
          if [ -f "build.py" ]; then
            python3 build.py || {
              echo "build.py script failed."    
              exit 1         
            }
          else
            echo "build.py not found, build failed."
            exit 1 
          fi

      - name: Verify ARM64 build output
        run: |
          echo "=== Verifying Build Output ==="
          
          if [ -f "dist/IPTV Scanner Editor Pro" ]; then
            chmod +x "dist/IPTV Scanner Editor Pro"
            
            # Verify it's actually an ARM64 binary
            file "dist/IPTV Scanner Editor Pro"
            echo ""
            ls -la "dist/IPTV Scanner Editor Pro"
            
            # Check architecture matches
            if file "dist/IPTV Scanner Editor Pro" | grep -q "ARM"; then
              echo "✅ Build is ARM64 native (correct!)"
            else
              echo "⚠️  WARNING: Binary may not be ARM64!"
              exit 1
            fi
          else
            echo "❌ Expected executable not found in dist/"
            ls -la dist/ 2>/dev/null || echo "No dist directory found"
            exit 1
          fi

      - name: Upload Linux ARM64 build to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            dist/IPTV Scanner Editor Pro
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
