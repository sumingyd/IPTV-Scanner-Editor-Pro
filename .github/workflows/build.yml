name: Build and Publish Windows EXE

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to check out and build."
        required: true
        default: "main"
        type: string
      release_tag:
        description: "Existing release tag to upload the executable to."
        required: true
        type: string

permissions:
  contents: write

env:
  EXE_PATH: dist/IPTV Scanner Editor Pro.exe
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

jobs:
  build-and-publish:
    name: Build EXE and update release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: |
          if (-not (Test-Path "build.py")) {
            throw "Build script not found: build.py"
          }
          python build.py

      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ env.EXE_PATH }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
