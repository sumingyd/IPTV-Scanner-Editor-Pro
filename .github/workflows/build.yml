name: Build and Publish App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the executables to."
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  MPV_URL: "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-v3-20260610-git-304426c.7z"
  FFMPEG_URL: "https://github.com/GyanD/codexffmpeg/releases/download/2026-06-08-git-6028720d70/ffmpeg-2026-06-08-git-6028720d70-essentials_build.7z"
  FFMPEG_LINUX_ARM64_URL: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linuxarm64-gpl-8.1.tar.xz"

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Prepare MPV/FFmpeg
        shell: powershell
        run: |
          Write-Host "Downloading mpv from: $env:MPV_URL"
          Invoke-WebRequest -Uri $env:MPV_URL -OutFile "mpv.7z"
          7z x mpv.7z -ompv -y
          dir ./mpv

          Write-Host "Downloading ffmpeg from: $env:FFMPEG_URL"
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile "ffmpeg.7z"
          $ffmpegExtractDir = "_ffmpeg_extract"
          7z x ffmpeg.7z "-o$ffmpegExtractDir" -y

          $ffmpegBin = Get-ChildItem -Path $ffmpegExtractDir -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } |
            Select-Object -First 1

          if ($null -eq $ffmpegBin) {
            throw "Could not find ffmpeg.exe after extracting ffmpeg.7z."
          }
          if (Test-Path ".\ffmpeg") {
            Remove-Item ".\ffmpeg" -Recurse -Force
          }
          Move-Item -Path $ffmpegBin.FullName -Destination ".\ffmpeg"
          dir ./ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/IPTV Scanner Editor Pro.exe")) {
            throw "Expected executable was not found"
          }

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro.exe
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MPV and FFmpeg via Homebrew
        run: |
          brew install mpv ffmpeg
          mkdir -p mpv
          cp /opt/homebrew/lib/libmpv.2.dylib mpv/ || cp /usr/local/lib/libmpv.2.dylib mpv/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: python build.py

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-app
          path: dist/IPTV Scanner Editor Pro.app

  build-macos-x86:
    name: Build macOS x86_64
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install x86_64 Homebrew
        run: |
          arch -x86_64 /bin/bash -c "NONINTERACTIVE=1 /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""

      - name: Install x86_64 dependencies via Homebrew
        run: |
          arch -x86_64 /bin/bash -c 'eval "$(/usr/local/bin/brew shellenv)" && brew install mpv && brew install ffmpeg'

      - name: Copy x86_64 libraries
        run: |
          mkdir -p mpv ffmpeg
          arch -x86_64 /bin/bash -c 'eval "$(/usr/local/bin/brew shellenv)" && cp $(brew --prefix mpv)/lib/libmpv.2.dylib mpv/'
          arch -x86_64 /bin/bash -c 'eval "$(/usr/local/bin/brew shellenv)" && cp $(brew --prefix ffmpeg)/bin/ffprobe ffmpeg/'
          ls -la mpv/ ffmpeg/

      - name: Set up Python (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"
          architecture: "x64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: python build.py

      - name: Verify x86_64 binary
        run: |
          file "dist/IPTV Scanner Editor Pro.app/Contents/MacOS/IPTV Scanner Editor Pro" | grep -q x86_64 || \
            echo "Warning: binary may not be x86_64"

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86-app
          path: dist/IPTV Scanner Editor Pro.app

  build-macos-universal:
    name: Build macOS Universal .app
    runs-on: macos-latest
    needs: [build-macos-arm64, build-macos-x86]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-app
          path: dist-arm64/IPTV Scanner Editor Pro.app

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86-app
          path: dist-x86/IPTV Scanner Editor Pro.app

      - name: Create Universal Binary
        run: |
          chmod +x dist-arm64/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro
          chmod +x dist-x86/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro

          cp -R dist-arm64/IPTV\ Scanner\ Editor\ Pro.app dist/IPTV\ Scanner\ Editor\ Pro.app

          mkdir -p dist/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS

          lipo -create \
            dist-arm64/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro \
            dist-x86/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro \
            -output dist/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro

          echo "=== Verify Universal Binary ==="
          file dist/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro
          lipo -info dist/IPTV\ Scanner\ Editor\ Pro.app/Contents/MacOS/IPTV\ Scanner\ Editor\ Pro

      - name: Package .app as zip
        run: |
          cd dist
          zip -r "IPTV Scanner Editor Pro-macOS-Universal.zip" "IPTV Scanner Editor Pro.app"

      - name: Verify .app
        run: |
          if [ ! -d "dist/IPTV Scanner Editor Pro.app" ]; then
            echo "Expected .app was not found"
            exit 1
          fi

      - name: Upload .app to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-macOS-Universal.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libmpv-dev ffmpeg

      - name: Prepare dependencies
        run: |
          mkdir -p mpv ffmpeg
          cp /usr/lib/x86_64-linux-gnu/libmpv.so.2 mpv/ 2>/dev/null || cp /usr/lib/libmpv.so.2 mpv/ 2>/dev/null || true
          cp /usr/bin/ffprobe ffmpeg/
          cp /usr/bin/ffmpeg ffmpeg/ 2>/dev/null || true
          chmod +x ffmpeg/ffprobe ffmpeg/ffmpeg 2>/dev/null || true
          ls -la mpv/ ffmpeg/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Verify executable
        run: |
          if [ ! -f "dist/IPTV Scanner Editor Pro" ]; then
            echo "Expected executable was not found"
            exit 1
          fi
          chmod +x "dist/IPTV Scanner Editor Pro"
          file "dist/IPTV Scanner Editor Pro"

      - name: Compress executable
        run: |
          cd dist
          tar czf "IPTV Scanner Editor Pro-Linux-x86_64.tar.gz" "IPTV Scanner Editor Pro"

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-Linux-x86_64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libmpv-dev

      - name: Prepare FFmpeg
        run: |
          mkdir -p ffmpeg
          
          # Try BtbN FFmpeg build first
          echo "Trying BtbN FFmpeg ARM64 build..."
          wget -q "$FFMPEG_LINUX_ARM64_URL" -O /tmp/ffmpeg-arm64.tar.xz 2>/dev/null && {
            tar -xf /tmp/ffmpeg-arm64.tar.xz -C /tmp/
            find /tmp -name "ffprobe" -type f -exec cp {} ffmpeg/ \;
            find /tmp -name "ffmpeg" -type f -exec cp {} ffmpeg/ \;
          } || echo "BtbN download failed, trying apt..."
          
          # Fallback: use system ffmpeg from apt
          if [ ! -f ./ffmpeg/ffprobe ]; then
            echo "Using system ffmpeg from apt..."
            sudo apt install -y ffmpeg
            cp /usr/bin/ffprobe ffmpeg/
            cp /usr/bin/ffmpeg ffmpeg/
          fi
          
          if [ ! -f ./ffmpeg/ffprobe ]; then
            echo "ffprobe not found"
            exit 1
          fi
          
          chmod +x ffmpeg/ffprobe ffmpeg/ffmpeg 2>/dev/null || true
          ls -la ffmpeg/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Verify executable
        run: |
          if [ ! -f "dist/IPTV Scanner Editor Pro" ]; then
            echo "Expected executable was not found"
            exit 1
          fi
          chmod +x "dist/IPTV Scanner Editor Pro"
          file "dist/IPTV Scanner Editor Pro"

      - name: Compress executable
        run: |
          cd dist
          tar czf "IPTV Scanner Editor Pro-Linux-ARM64.tar.gz" "IPTV Scanner Editor Pro"

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-Linux-ARM64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-35"
          sdkmanager --install "build-tools;35.0.0"
          sdkmanager --install "ndk;27.2.12479018"
          yes | sdkmanager --licenses

      - name: Copy mobile web assets
        run: |
          mkdir -p android/app/src/main/assets/mobile
          cp -r server/mobile/* android/app/src/main/assets/mobile/ || true

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew || true

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug || {
            echo "Gradle build failed - checking if wrapper exists"
            if [ ! -f gradlew ]; then
              echo "Gradle wrapper not found, generating..."
              gradle wrapper --gradle-version 8.11.1
              ./gradlew assembleDebug
            fi
          }

      - name: Upload Debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload APK to release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: android/app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
