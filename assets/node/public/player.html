<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>IPTV Player</title>
<style>
b{line-height:1}
{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
.header h1{font-size:16px;font-weight:600}
.header .status{display:flex;align-items:center;gap:6px;font-size:12px;color:#8b949e}
.header .dot{width:8px;height:8px;border-radius:50%;background:#3fb950;box-shadow:0 0 6px #3fb950}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:8px 12px;border-bottom:1px solid #30363d}
.search-box{width:100%;padding:6px 10px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:13px;outline:none}
.search-box:focus{border-color:#58a6ff}
.group-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:6px 12px;border-bottom:1px solid #30363d;max-height:80px;overflow-y:auto}
.group-tab{padding:3px 8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;font-size:11px;color:#8b949e;cursor:pointer;white-space:nowrap}
.group-tab.active{background:#1f6feb;border-color:#58a6ff;color:#fff}
.channel-list{flex:1;overflow-y:auto;padding:4px 0}
.channel-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;transition:background .15s}
.channel-item:hover{background:rgba(88,166,255,.08)}
.channel-item.active{background:rgba(88,166,255,.15);border-left:2px solid #58a6ff}
.channel-item .logo{width:28px;height:28px;border-radius:4px;object-fit:contain;background:#0d1117;flex-shrink:0}
.channel-item .info{flex:1;min-width:0}
.channel-item .name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel-item .group{font-size:10px;color:#8b949e}
.player-area{flex:1;display:flex;flex-direction:column;position:relative;background:#000}
video{width:100%;height:100%;object-fit:contain}
.osd{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:8px;padding:8px 14px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s}
.osd.show{opacity:1}
.controls{display:flex;align-items:center;gap:12px;padding:6px 16px;background:#161b22;border-top:1px solid #30363d;flex-shrink:0}
.ctrl-btn{background:none;border:none;color:#e6edf3;cursor:pointer;padding:4px;border-radius:4px;font-size:18px;display:flex;align-items:center;justify-content:center;width:32px;height:32px}
.ctrl-btn:hover{background:rgba(255,255,255,.1)}
.ctrl-btn.active{color:#58a6ff}
.volume-wrap{display:flex;align-items:center;gap:6px}
.volume-wrap input[type=range]{width:80px;accent-color:#58a6ff}
.channel-info{flex:1;text-align:center;font-size:12px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.speed-select{background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:4px;padding:2px 6px;font-size:12px}
@media(max-width:768px){.sidebar{width:100%;position:absolute;z-index:10;height:100%;transform:translateX(-100%);transition:transform .3s}.sidebar.open{transform:translateX(0)}}
</style>
</head>
<body>
<div class="header"><h1>IPTV Player</h1><div class="status"><div class="dot" id="statusDot"></div><span id="statusText">connecting...</span></div></div>
<div class="main"><div class="sidebar" id="sidebar"><div class="sidebar-header"><input class="search-box" id="search" placeholder="search channel..."></div><div class="group-tabs" id="groups"></div><div class="channel-list" id="channelList"></div></div><div class="player-area"><video id="video" controls autoplay></video><div class="osd" id="osd"></div></div></div>
<div class="controls"><button class="ctrl-btn" id="btnSidebar" title="Channels">&#9776;</button><button class="ctrl-btn" id="btnPrev" title="Prev">&#9664;</button><button class="ctrl-btn" id="btnPlay" title="Play/Pause">&#9654;</button><button class="ctrl-btn" id="btnNext" title="Next">&#9654;</button><div class="volume-wrap"><button class="ctrl-btn" id="btnMute" title="Mute">&#128264;</button><input type="range" id="volume" min="0" max="100" value="80"></div><select class="speed-select" id="speed"><option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="1.5">1.5x</option><option value="2">2x</option></select><div class="channel-info" id="channelInfo">-</div><button class="ctrl-btn" id="btnPip" title="PiP">&#9635;</button><button class="ctrl-btn" id="btnFullscreen" title="Fullscreen">&#9974;</button></div>
<script>
const API=location.origin;let channels=[],groups=[],currentIdx=-1,osdTimer=null;
const $=id=>document.getElementById(id);
const video=$('video'),channelList=$('channelList'),groupTabs=$('groups');
async function init(){try{const r=await fetch(API+'/api/channels?size=2000');const j=await r.json();if(j.success){channels=j.channels||[];groups=j.groups||[];renderGroups();renderChannels();$('statusText').textContent=channels.length+' channels';}else{$('statusText').textContent='no data';$('statusDot').style.background='var(--danger)';}}catch(e){$('statusText').textContent='error';$('statusDot').style.background='var(--danger)';}}
function renderGroups(){groupTabs.innerHTML='<div class="group-tab active" data-group="">All</div>'+groups.map(g=>'div class="group-tab" data-group="'+g+'">'+g+'</div>').join('');groupTabs.querySelectorAll('.group-tab').forEach(t=>t.onclick=()=>{groupTabs.querySelectorAll('.group-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');renderChannels(t.dataset.group);});}
function renderChannels(groupFilter=''){const q=$('search').value.toLowerCase();let list=channels;if(groupFilter)list=list.filter(c=>c.group===groupFilter);if(q)list=list.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.group||'').toLowerCase().includes(q)));channelList.innerHTML=list.map((c,i)=>{const idx=c._index!==undefined?c._index:channels.indexOf(c);return'<div class="channel-item'+(idx===currentIdx?' active':'')+'" data-idx="'+idx+'"><+(c.logo?'<img class="logo" src="'+c.logo+'" onerror="this.style.display=\'none\'">':'<div class="logo"></div>')+'<div class="info"><div class="name">'+(c.name||'')+'</div><div class="group">'+(c.group||'')+'</div></div></div>';}).join('');channelList.querySelectorAll('.channel-item').forEach(el=>el.onclick=()=>play(parseInt(el.dataset.idx)));}
function play(idx){if(idx<0||idx>=channels.length)return;currentIdx=idx;const ch=channels[idx];video.src=API+'/stream/'+idx;video.play().catch(()=>{});$('channelInfo').textContent=ch.name+(ch.group?' - '+ch.group:'');showOSD(ch.name+(ch.group?' ('+ch.group+')':''));channelList.querySelectorAll('.channel-item').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.idx)===idx));}
function showOSD(text){$('osd').textContent=text;$('osd').classList.add('show');clearTimeout(osdTimer);osdTimer=setTimeout(()=>$('osd').classList.remove('show'),3000);}
$('btnPlay').onclick=(9=>video.paused?video.play():video.pause());$('btnPrev').onclick=()=>play(Math.max(0,currentIdx-1));$('btnNext').onclick=()=>play(Math.min(channels.length-1,currentIdx+1));
$('btnMute').onclick=()=>{video.muted=!video.muted;$('btnMute').innerHTML=video.muted?'&#128263;:'&#128264;'};
$('volume').oninput=e=>{video.volume=e.target.value/100};
$('speed').onchange=e=>{video.playbackRate=parseFloat(e.target.value)};
$('btnFullscreen').onclick=()=>{document.fullscreenElement?document.exitFullscreen():$('.player-area').requestFullscreen()};
$('btnPip').onclick=()=>{try{video.requestPictureInPicture()}catch(e){}};
$('btnSidebar').onclick=()=>$('sidebar').classList.toggle('open');
$('search').oninput=()=>renderChannels(groupTabs.querySelector('.group-tab.active')?.dataset.group||'');
video.volume=0.8;
init();
</script>
</body>
</html>
